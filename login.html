<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 知产管家 IP Butler</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <div class="brand">
        <span class="brand-mark">IP</span>
        <h1>知产管家</h1>
        <p class="tagline">商标 & 软著智能填报助手</p>
      </div>

      <form id="loginForm" class="login-form" autocomplete="on">
        <label>
          <span>访问密码</span>
          <input id="pw" type="password" placeholder="请输入密码" required autocomplete="current-password" />
        </label>
        <button type="submit" class="btn-login">登录</button>
        <p id="err" class="err"></p>
      </form>

      <div class="hint">
        <p>首次使用请联系管理员获取密码</p>
        <p class="muted">v1.0 · IP Butler 2026</p>
      </div>
    </div>
  </div>

  <script>
    // ===== 配置：默认密码的 SHA-256 =====
    // 默认密码：wujiong2026
    // 修改密码：把新密码的 SHA-256 替换到 PASSWORD_HASH
    const PASSWORD_HASH = '6ea8c63cdda293ec5a1d503c6b84776fac07c8bcba2b5a5d112c04dc179331a5';

    async function sha256(s) {
      const buf = new TextEncoder().encode(s);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 已登录直接进
    if (sessionStorage.getItem('zc_auth') === '1') {
      location.replace('index.html');
    }

    const form = document.getElementById('loginForm');
    const pwInput = document.getElementById('pw');
    const errEl = document.getElementById('err');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = pwInput.value;
      if (!pw) {
        errEl.textContent = '请输入密码';
        return;
      }
      errEl.textContent = '验证中…';
      const h = await sha256(pw);
      if (h === PASSWORD_HASH) {
        sessionStorage.setItem('zc_auth', '1');
        // 30 分钟无操作过期
        sessionStorage.setItem('zc_auth_ts', String(Date.now()));
        location.replace('index.html');
      } else {
        errEl.textContent = '密码错误';
        pwInput.select();
      }
    });

    // 每分钟检查一次 session 是否过期
    setInterval(() => {
      const ts = parseInt(sessionStorage.getItem('zc_auth_ts') || '0', 10);
      if (ts && Date.now() - ts > 30 * 60 * 1000) {
        sessionStorage.removeItem('zc_auth');
        sessionStorage.removeItem('zc_auth_ts');
      }
    }, 60000);
  </script>
</body>
</html>
